<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CinemaniacsHub | Movies & Web Series</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #fff; color: #000; padding-bottom: 100px; }
    .header { display: flex; align-items: center; padding: 6px 10px; gap: 8px; }
    .logo-container { position: relative; display: flex; align-items: center; height: 50px; flex-shrink: 0; }
    .logo-circle { position: absolute; right: -25px; width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, #00c6ff, #0072ff); }
    .logo-text { font-size: 20px; font-weight: 800; color: black; left: 2.5px; position: relative; z-index: 3; }
    body.dark-mode .logo-text { color: white; }
    .header-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    #searchInput { padding: 10px 16px 10px 38px; border-radius: 60px; border: 1px solid #e2e8f0; background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>') no-repeat 14px center; background-size: 16px; font-size: .9rem; min-width: 80px; max-width: 130px; }
    #searchInput:focus { outline: none; border-color: #3b82f6; }
    .banner-container { position: relative; width: calc(100% - 20px); margin: 0 10px; border-radius: 20px; overflow: hidden; }
    .banner-slide { display: flex; transition: transform .8s ease-in-out; cursor: grab; }
    .banner-item { min-width: 100%; position: relative; height: 200px; background-size: cover; background-position: center 20%; display: flex; align-items: flex-end; padding: 15px; color: white; border-radius: 20px; }
    .banner-item::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, .5); border-radius: 20px; }
    .banner-content { position: relative; z-index: 1; }
    .banner-content h1 { margin: 0; font-size: 20px; }
    .banner-content p { margin: 5px 0 0; font-size: 12px; }
    .banner-content button { margin-top: 8px; padding: 8px 18px; border: none; background: linear-gradient(45deg, #00c6ff, #0072ff); color: white; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .banner-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 5; }
    .banner-dot { width: 8px; height: 8px; border-radius: 10px; background: rgba(255,255,255,.6); cursor: pointer; }
    .banner-dot.active { width: 24px; background: #3b82f6; }
    .arrow { position: absolute; top: 40%; transform: translateY(-50%); width: 30px; height: 30px; background: rgba(0,0,0,.3); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 3; }
    .arrow-left { left: 10px; }
    .arrow-right { right: 10px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 15px 8px 15px; }
    .section-header h2 { font-size: 18px; font-weight: 700; }
    .more-btn { font-size: 11px; padding: 4px 12px; border-radius: 20px; color: white; font-weight: 600; border: none; cursor: pointer; background: linear-gradient(45deg, #00c6ff, #0072ff); }
    .movies { display: flex; gap: 12px; overflow-x: auto; padding: 0 15px 10px 15px; scrollbar-width: thin; }
    .card, .upcoming-card { flex-shrink: 0; text-align: center; cursor: pointer; }
    .card img, .upcoming-card img { width: 120px; height: 180px; border-radius: 8px; object-fit: cover; }
    .title { font-size: 12px; margin-top: 5px; text-align: center; font-weight: 500; }
    .year { font-size: 10px; color: #666; }
    .bottomnav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #D6EBFF; display: flex; justify-content: space-around; align-items: center; height: 65px; border-radius: 25px; z-index: 1000; }
    .menu { display: flex; justify-content: center; align-items: center; position: relative; flex: 1; cursor: pointer; }
    .menu img { width: 24px; height: 24px; opacity: .7; }
    .bottomnav .menu:nth-child(3) img { width: 34px; height: 34px; }
    .active-bar::after { content: ""; position: absolute; top: -15px; width: 30px; height: 4px; background: linear-gradient(45deg, #00c6ff, #0072ff); border-radius: 0 0 5px 5px; }
    .movie-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.88); backdrop-filter: blur(10px); visibility: hidden; opacity: 0; transition: .2s ease; display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .movie-modal.show { visibility: visible; opacity: 1; }
    body.modal-open { overflow: hidden; }
    .modal-card { display: flex; flex-direction: column; max-height: 90vh; overflow-y: auto; width: min(400px, 92vw); background: #fff; border-radius: 20px; position: relative; }
    .modal-poster { width: 100%; height: auto; max-height: 50vh; object-fit: contain; background: #0a0f1c; }
    .modal-info { padding: 12px 14px; }
    .modal-info h2 { text-align: center; margin: 10px 0 5px; font-size: 22px; }
    .year-text { text-align: center; margin-bottom: 15px; font-size: 14px; color: #555; }
    .meta { display: flex; gap: 12px; justify-content: center; margin: 8px 0; }
    .genres { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0; }
    .genres span { background: #e0e0e0; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .plot-text { margin: 10px 0; line-height: 1.4; }
    #togglePlot { display: inline-block; margin-top: 5px; color: #0072ff; font-size: 13px; cursor: pointer; font-weight: 600; }
    .extra-info { margin-top: 12px; font-size: 13px; line-height: 1.5; }
    #telegramBtn { margin: 0 14px 20px 14px; width: calc(100% - 28px); padding: 14px; border-radius: 40px; background: linear-gradient(135deg, #0088cc, #0055a4); color: white; border: none; font-weight: bold; cursor: pointer; }
    .close-modal { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,.6); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 20px; font-weight: bold; }
    .language-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 15px; scrollbar-width: thin; }
    .lang-btn { padding: 8px 18px; border-radius: 40px; border: none; background: linear-gradient(45deg, #00c6ff, #0072ff); color: white; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
    #languageModal .modal-card { background: #fff; }
    .language-movies-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; padding: 20px; justify-items: center; max-height: 60vh; overflow-y: auto; }
    .lang-movie-card { text-align: center; cursor: pointer; width: 100%; max-width: 100px; }
    .lang-movie-card img { width: 100%; height: 150px; border-radius: 8px; object-fit: cover; }
    .toast-message { position: fixed; top: 80px; right: 20px; background: linear-gradient(45deg, #00c6ff, #0072ff); color: white; padding: 12px 20px; border-radius: 16px; font-weight: bold; font-size: 14px; z-index: 10000; animation: slideInRight .3s ease, fadeOut .3s ease 1.5s forwards; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    body.dark-mode { background: #1a1a2e; color: #fff; }
    body.dark-mode .modal-card { background: #0f172a; color: #fff; }
    body.dark-mode .genres span { background: #1e2a3a; color: #e2e8f0; }
    body.dark-mode .year-text { color: #ccc; }
    #searchResultsContainer { display: none; padding: 20px 15px; }
    .search-results-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: flex-start; }
    .search-result-card { flex-shrink: 0; text-align: center; cursor: pointer; width: 120px; }
    .search-result-card img { width: 120px; height: 180px; border-radius: 8px; object-fit: cover; }
    @media (max-width:480px) { .card img, .upcoming-card img { width: 100px; height: 150px; } .search-result-card { width: 100px; } .search-result-card img { width: 100px; height: 150px; } }
  </style>
</head>
<body>
<div class="header">
  <div class="logo-container"><div class="logo-circle"></div><div class="logo-text">Cinemaniacs Hub</div></div>
  <div class="header-right"><input type="text" id="searchInput" placeholder="Search movies, series..."><button id="themeToggle" style="background:#f0f0f0;border:none;font-size:20px;cursor:pointer;padding:8px;border-radius:50%;width:38px;height:38px;">🌙</button></div>
</div>
<div id="homepageContent">
  <div class="banner-container"><div class="banner-slide" id="bannerSlide"></div><div class="banner-dots" id="bannerDots"></div><div class="arrow arrow-left" id="arrowLeft">&#10094;</div><div class="arrow arrow-right" id="arrowRight">&#10095;</div></div>
  <div class="section-header"><h2>| Watch Popular Movies</h2><span class="more-btn" data-target="popularMovies">+ More</span></div>
  <div class="movies" id="popularMovies"></div>
  <div class="section-header"><h2>| Select Language</h2></div>
  <div class="language-container"><button class="lang-btn" data-lang="hindi">Hindi</button><button class="lang-btn" data-lang="english">English</button><button class="lang-btn" data-lang="tamil">Tamil</button><button class="lang-btn" data-lang="telugu">Telugu</button><button class="lang-btn" data-lang="malayalam">Malayalam</button><button class="lang-btn" data-lang="kannada">Kannada</button></div>
  <div class="section-header"><h2>| Upcoming Movies</h2><span class="more-btn" data-target="upcomingMovies">+ More</span></div>
  <div class="movies" id="upcomingMovies"></div>
  <div class="section-header"><h2>| Popular WebSeries</h2><span class="more-btn" data-target="webSeries">+ More</span></div>
  <div class="movies" id="webSeries"></div>
</div>
<div id="searchResultsContainer"><h3>Search Results</h3><div id="searchResultsGrid" class="search-results-grid"></div></div>
<div class="bottomnav"><div class="menu" data-nav="home"><img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="home"></div><div class="menu" data-nav="tv"><img src="https://cdn-icons-png.flaticon.com/512/1527/1527064.png" alt="tv"></div><div class="menu" data-nav="games"><img src="https://cdn-icons-png.flaticon.com/512/10855/10855296.png" alt="games"></div></div>
<div id="movieModal" class="movie-modal"><div class="modal-card"><img id="modalPoster" class="modal-poster"><div class="close-modal" id="closeModalBtn">✕</div><div class="modal-info"><h2 id="modalTitle"></h2><div id="modalYearText" class="year-text"></div><div class="meta"><span>IMDB <b id="modalRating"></b></span><span id="modalAge"></span></div><div class="genres" id="modalGenres"></div><p id="modalPlot" class="plot-text"></p><span id="togglePlot" class="plot-toggle">Show More ▼</span><div class="extra-info"><p><b>Duration:</b> <span id="modalDuration"></span></p><p><b>Type:</b> <span id="modalType"></span></p><p><b>Director:</b> <span id="modalDirector"></span></p><p><b>Released:</b> <span id="modalRelease"></span></p><p><b>Language:</b> <span id="modalLanguage"></span></p><p><b>Quality:</b> <span id="modalQuality"></span></p></div></div><button id="streamBtn" style="margin:0 14px 12px 14px;width:calc(100% - 28px);padding:14px;border-radius:40px;background:linear-gradient(135deg,#ff416c,#ff4b2b);color:white;border:none;font-weight:bold;cursor:pointer;">🎬 Watch Now (Stream)</button><button id="telegramBtn">Get Telegram Files</button></div></div>

<script>
let moviesData = { popular: [], upcoming: [], webSeries: [], banner: [] };

async function loadData() {
  try {
    const response = await fetch('movies.json');
    const data = await response.json();
    moviesData = data;
    renderMovieSection('popularMovies', moviesData.popular);
    renderMovieSection('upcomingMovies', moviesData.upcoming);
    renderMovieSection('webSeries', moviesData.webSeries);
    buildBanner();
  } catch(e) {
    console.error('Error loading movies.json', e);
  }
}

function renderMovieSection(id, arr) { 
  const c = document.getElementById(id); 
  if(!c) return; 
  c.innerHTML = ''; 
  if(!arr) return;
  arr.forEach(m => { 
    const d = document.createElement('div'); 
    d.className = 'card'; 
    d.innerHTML = `<img src="${m.poster}"><div class="title">${m.title}<br><span class="year">(${m.year})</span></div>`; 
    d.onclick = () => openModal(m); 
    c.appendChild(d); 
  }); 
}

function openModal(m) { 
  const plotFull = m.plot || ""; 
  const short = plotFull.length > 100 ? plotFull.slice(0,100)+"..." : plotFull; 
  let expanded = false; 
  document.getElementById('modalPlot').innerText = short; 
  const toggle = document.getElementById('togglePlot'); 
  if(plotFull.length > 100) { 
    toggle.style.display = 'inline-block'; 
    toggle.onclick = () => { 
      expanded = !expanded; 
      document.getElementById('modalPlot').innerText = expanded ? plotFull : short; 
      toggle.innerText = expanded ? "Show Less ▲" : "Show More ▼"; 
    }; 
  } else toggle.style.display = 'none'; 
  document.getElementById('modalTitle').innerText = m.title; 
  document.getElementById('modalPoster').src = m.poster; 
  document.getElementById('modalRating').innerText = m.rating || "N/A"; 
  document.getElementById('modalYearText').innerText = `(${m.year})`; 
  document.getElementById('modalAge').innerText = m.age || "U/A"; 
  document.getElementById('modalDuration').innerText = m.duration || "-"; 
  document.getElementById('modalType').innerText = m.type || "-"; 
  document.getElementById('modalDirector').innerText = m.director || "-"; 
  document.getElementById('modalRelease').innerText = m.released || "-"; 
  let lang = Array.isArray(m.language) ? m.language.join(", ") : m.language || "-"; 
  document.getElementById('modalLanguage').innerText = lang; 
  document.getElementById('modalQuality').innerText = m.quality || "-"; 
  document.getElementById('modalGenres').innerHTML = m.genres ? m.genres.map(g => `<span>${g}</span>`).join('') : ''; 
  document.getElementById('streamBtn').setAttribute('data-stream-link', m.streamLink || '#'); 
  document.getElementById('telegramBtn').setAttribute('data-telegram-link', m.telegramLink || "#"); 
  document.getElementById('movieModal').classList.add('show'); 
  document.body.classList.add('modal-open'); 
}

function closeModal() { 
  document.getElementById('movieModal').classList.remove('show'); 
  document.body.classList.remove('modal-open'); 
}

let bannerIdx = 0, autoTimer;

function buildBanner() { 
  const slide = document.getElementById('bannerSlide'); 
  const dots = document.getElementById('bannerDots'); 
  if(!moviesData.banner || moviesData.banner.length === 0) return;
  slide.innerHTML = ''; 
  moviesData.banner.forEach((b, i) => { 
    const div = document.createElement('div'); 
    div.className = 'banner-item'; 
    div.style.backgroundImage = `url('${b.poster}')`; 
    div.innerHTML = `<div class="banner-content"><h1>${b.title}</h1><p>${b.year} ‧ ${b.genre}</p><button class="banner-watch-btn" data-title="${b.title}" data-poster="${b.poster}" data-year="${b.year}">Watch Now</button></div>`; 
    slide.appendChild(div); 
  }); 
  dots.innerHTML = ''; 
  moviesData.banner.forEach((_, i) => { 
    const dot = document.createElement('div'); 
    dot.classList.add('banner-dot'); 
    if(i === 0) dot.classList.add('active'); 
    dot.onclick = () => goToSlide(i); 
    dots.appendChild(dot); 
  }); 
  function goToSlide(i) { bannerIdx = i; updateBanner(); } 
  function updateBanner() { 
    slide.style.transform = `translateX(-${bannerIdx * 100}%)`; 
    document.querySelectorAll('.banner-dot').forEach((d, i) => { 
      if(i === bannerIdx) d.classList.add('active'); 
      else d.classList.remove('active'); 
    }); 
  } 
  document.getElementById('arrowLeft').onclick = () => { 
    bannerIdx = (bannerIdx - 1 + moviesData.banner.length) % moviesData.banner.length; 
    updateBanner(); 
    resetTimer(); 
  }; 
  document.getElementById('arrowRight').onclick = () => { 
    bannerIdx = (bannerIdx + 1) % moviesData.banner.length; 
    updateBanner(); 
    resetTimer(); 
  }; 
  function resetTimer() { 
    if(autoTimer) clearInterval(autoTimer); 
    autoTimer = setInterval(() => { 
      bannerIdx = (bannerIdx + 1) % moviesData.banner.length; 
      updateBanner(); 
    }, 4000); 
  } 
  updateBanner(); 
  resetTimer(); 
  document.querySelectorAll('.banner-watch-btn').forEach(btn => { 
    btn.onclick = (e) => { 
      e.stopPropagation(); 
      const title = btn.dataset.title; 
      const allMovies = [...moviesData.popular, ...moviesData.upcoming, ...moviesData.webSeries]; 
      const movie = allMovies.find(m => m.title === title); 
      if(movie) openModal(movie); 
      else openModal({title, poster: btn.dataset.poster, year: btn.dataset.year, plot: "Coming soon", type: "Movie", rating: "N/A", language: "Multi"}); 
    }; 
  }); 
}

function initSearch() { 
  const inp = document.getElementById('searchInput'); 
  const home = document.getElementById('homepageContent'); 
  const resDiv = document.getElementById('searchResultsContainer'); 
  const grid = document.getElementById('searchResultsGrid'); 
  const all = [...moviesData.popular, ...moviesData.upcoming, ...moviesData.webSeries]; 
  inp.oninput = () => { 
    const val = inp.value.trim().toLowerCase(); 
    if(!val) { 
      home.style.display = 'block'; 
      resDiv.style.display = 'none'; 
      return; 
    } 
    home.style.display = 'none'; 
    resDiv.style.display = 'block'; 
    const filtered = all.filter(m => m.title.toLowerCase().includes(val)); 
    grid.innerHTML = ''; 
    if(!filtered.length) { 
      grid.innerHTML = '<div class="no-results">No matching movies or series found</div>'; 
      return; 
    } 
    filtered.forEach(m => { 
      const card = document.createElement('div'); 
      card.className = 'search-result-card'; 
      card.innerHTML = `<img src="${m.poster}"><div class="title">${m.title}<br><span class="year">(${m.year})</span></div>`; 
      card.onclick = () => openModal(m); 
      grid.appendChild(card); 
    }); 
  }; 
}

function initLangModal() { 
  document.querySelectorAll('.lang-btn').forEach(btn => { 
    btn.onclick = () => { 
      const lang = btn.dataset.lang; 
      const all = [...moviesData.popular, ...moviesData.upcoming, ...moviesData.webSeries]; 
      const filtered = all.filter(m => { 
        if(!m.language) return false; 
        if(Array.isArray(m.language)) return m.language.some(l => l.toLowerCase() === lang); 
        return m.language.toLowerCase() === lang; 
      }); 
      if(!filtered.length) { 
        const t = document.createElement('div'); 
        t.className = 'toast-message'; 
        t.innerText = `No ${lang} movies`; 
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 1500); 
        return; 
      } 
      const modalDiv = document.createElement('div'); 
      modalDiv.className = 'movie-modal'; 
      modalDiv.innerHTML = `<div class="modal-card"><div class="close-modal" id="langClose">✕</div><h3 style="text-align:center;margin:20px 0 0;">${lang.toUpperCase()} Movies</h3><div id="langGrid" style="display:flex;flex-wrap:wrap;gap:15px;padding:20px;justify-content:center;max-height:60vh;overflow-y:auto;"></div></div>`; 
      document.body.appendChild(modalDiv); 
      const grid = modalDiv.querySelector('#langGrid'); 
      filtered.forEach(m => { 
        const card = document.createElement('div'); 
        card.style.width = '100px'; 
        card.style.textAlign = 'center'; 
        card.style.cursor = 'pointer'; 
        card.innerHTML = `<img src="${m.poster}" style="width:100px;height:150px;border-radius:8px;object-fit:cover;"><div style="font-size:12px;margin-top:5px;">${m.title}</div>`; 
        card.onclick = () => { openModal(m); modalDiv.remove(); document.body.classList.remove('modal-open'); }; 
        grid.appendChild(card); 
      }); 
      modalDiv.classList.add('show'); 
      document.body.classList.add('modal-open'); 
      modalDiv.querySelector('#langClose').onclick = () => { modalDiv.remove(); document.body.classList.remove('modal-open'); }; 
      modalDiv.onclick = (e) => { if(e.target === modalDiv) { modalDiv.remove(); document.body.classList.remove('modal-open'); } }; 
    }; 
  }); 
}

function initMore() { 
  document.querySelectorAll('.more-btn').forEach(btn => { 
    btn.onclick = () => { 
      const target = document.getElementById(btn.dataset.target); 
      if(target) target.scrollLeft += 260; 
    }; 
  }); 
}

function initNav() { 
  document.querySelectorAll('.bottomnav .menu').forEach(m => { 
    m.onclick = () => { 
      const t = m.dataset.nav; 
      if(t === 'tv' || t === 'games') { 
        const toast = document.createElement('div'); 
        toast.className = 'toast-message'; 
        toast.innerText = 'Coming Soon..!'; 
        document.body.appendChild(toast); 
        setTimeout(() => toast.remove(), 2000); 
        return; 
      } 
      document.querySelectorAll('.bottomnav .menu').forEach(x => x.classList.remove('active-bar')); 
      m.classList.add('active-bar'); 
      if(t === 'home') window.scrollTo({top: 0, behavior: 'smooth'}); 
    }; 
  }); 
}

function initTheme() { 
  const btn = document.getElementById('themeToggle'); 
  const body = document.body; 
  if(localStorage.getItem('theme') === 'dark') { 
    body.classList.add('dark-mode'); 
    btn.innerHTML = '☀️'; 
  } 
  btn.onclick = () => { 
    body.classList.toggle('dark-mode'); 
    const isDark = body.classList.contains('dark-mode'); 
    btn.innerHTML = isDark ? '☀️' : '🌙'; 
    localStorage.setItem('theme', isDark ? 'dark' : 'light'); 
  }; 
}

document.getElementById('streamBtn').onclick = () => { 
  const link = document.getElementById('streamBtn').getAttribute('data-stream-link'); 
  if(link && link !== '#') window.open(link, '_blank'); 
  else { 
    const t = document.createElement('div'); 
    t.className = 'toast-message'; 
    t.innerText = 'Stream link not available'; 
    document.body.appendChild(t); 
    setTimeout(() => t.remove(), 1500); 
  } 
};

document.getElementById('telegramBtn').onclick = () => { 
  const link = document.getElementById('telegramBtn').getAttribute('data-telegram-link'); 
  if(link && link !== '#') window.open(link, '_blank'); 
  else { 
    const t = document.createElement('div'); 
    t.className = 'toast-message'; 
    t.innerText = 'Telegram link not available'; 
    document.body.appendChild(t); 
    setTimeout(() => t.remove(), 1500); 
  } 
};

document.getElementById('closeModalBtn').onclick = closeModal; 
document.getElementById('movieModal').onclick = (e) => { if(e.target === document.getElementById('movieModal')) closeModal(); };

loadData();
initSearch();
initLangModal();
initMore();
initNav();
initTheme();
setTimeout(() => { document.querySelector('.bottomnav .menu[data-nav="home"]')?.classList.add('active-bar'); }, 100);
</script>
</body>
</html>
