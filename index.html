<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CinemaniacsHub | Movies & Web Series</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      padding-bottom: 100px;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
      flex-shrink: 0;
    }

    .logo-circle {
      position: absolute;
      right: -25px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: black;
      left: 2.5px;
      position: relative;
      z-index: 3;
    }

    body.dark-mode .logo-text {
      color: white;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    #searchInput {
      padding: 10px 16px 10px 38px;
      border-radius: 60px;
      border: 1px solid #e2e8f0;
      background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>') no-repeat 14px center;
      background-size: 16px;
      font-size: .9rem;
      min-width: 80px;
      max-width: 130px;
      transition: max-width 0.25s ease;
    }

    #searchInput:focus {
      outline: none;
      border-color: #3b82f6;
      max-width: 135px;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, .2);
    }

    .banner-container {
      position: relative;
      width: calc(100% - 20px);
      margin: 0 10px;
      border-radius: 20px;
      overflow: hidden;
    }

    .banner-slide {
      display: flex;
      transition: transform .8s ease-in-out;
      cursor: grab;
    }

    .banner-slide:active {
      cursor: grabbing;
    }

    .banner-item {
      min-width: 100%;
      position: relative;
      height: 200px;
      background-size: cover;
      background-position: center 20%;
      display: flex;
      align-items: flex-end;
      padding: 15px;
      box-sizing: border-box;
      color: white;
      user-select: none;
      border-radius: 20px;
    }

    .banner-item::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, .5);
    }

    .banner-content {
      position: relative;
      z-index: 1;
    }

    .banner-content h1 {
      margin: 0;
      font-size: 20px;
    }

    .banner-content p {
      margin: 5px 0 0;
      font-size: 12px;
    }

    .banner-content button {
      margin-top: 8px;
      padding: 8px 18px;
      border: none;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      border-radius: 40px;
      font-weight: 600;
      font-size: .8rem;
      cursor: pointer;
      transition: transform .1s;
    }

    .banner-content button:active {
      transform: scale(.96);
    }

    .banner-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 5;
    }

    .banner-dot {
      width: 8px;
      height: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .6);
      transition: all .2s;
      cursor: pointer;
    }

    .banner-dot.active {
      width: 24px;
      background: #3b82f6;
    }

    .arrow {
      position: absolute;
      top: 40%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      background: rgba(0, 0, 0, .3);
      color: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      z-index: 3;
      user-select: none;
    }

    .arrow-left {
      left: 10px;
    }

    .arrow-right {
      right: 10px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-left: 15px;
      margin-right: 15px;
      margin-top: 20px;
      margin-bottom: 8px;
    }

    .section-header h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .more-btn {
      font-size: 11px;
      outline: none;
      padding: 4px 12px;
      border-radius: 20px;
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    .movies {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 10px;
      padding-left: 15px;
      padding-right: 15px;
      scrollbar-width: thin;
    }

    .movies::-webkit-scrollbar {
      height: 4px;
    }

    .card, .upcoming-card {
      flex-shrink: 0;
      text-align: center;
      cursor: pointer;
      transition: transform .2s;
    }

    .card img, .upcoming-card img {
      width: 120px;
      height: 180px;
      border-radius: 8px;
      object-fit: cover;
    }

    .title {
      font-size: 12px;
      margin-top: 5px;
      text-align: center;
      font-weight: 500;
      color: #000;
    }

    body.dark-mode .title {
      color: #fff !important;
    }

    .year {
      font-size: 10px;
      color: #666;
    }

    body.dark-mode .year {
      color: #ccc !important;
    }

    .bottomnav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: #D6EBFF;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 65px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
      z-index: 1000;
    }

    .menu {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      flex: 1;
      cursor: pointer;
    }

    .menu img {
      width: 24px;
      height: 24px;
      opacity: .7;
    }

    .bottomnav .menu:nth-child(3) img {
      width: 34px;
      height: 34px;
    }

    .active-bar::after {
      content: "";
      position: absolute;
      top: -15px;
      width: 30px;
      height: 4px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      border-radius: 0 0 5px 5px;
    }

    .movie-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, .88);
      backdrop-filter: blur(10px);
      visibility: hidden;
      opacity: 0;
      transition: .2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .movie-modal.show {
      visibility: visible;
      opacity: 1;
    }

    body.modal-open {
      overflow: hidden;
    }

    .modal-card {
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      overflow-y: auto;
      width: min(400px, 92vw);
      background: #fff;
      color: #000;
      border-radius: 20px;
      position: relative;
      scrollbar-width: thin;
    }

    .modal-card::-webkit-scrollbar {
      width: 6px;
    }

    .modal-card::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, .1);
      border-radius: 10px;
    }

    .modal-card::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border-radius: 10px;
    }

    .modal-poster {
      width: 100%;
      height: auto;
      max-height: 50vh;
      object-fit: contain;
      background: #0a0f1c;
    }

    .modal-info {
      padding: 12px 14px;
    }

    .modal-info h2 {
      text-align: center;
      margin: 10px 0 5px;
      font-size: 22px;
    }

    .year-text {
      text-align: center;
      margin-bottom: 15px;
      font-size: 14px;
      color: #555;
    }

    .meta {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 8px 0;
    }

    .genres {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin: 10px 0;
    }

    .genres span {
      background: #e0e0e0;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #333;
    }

    .plot-text {
      margin: 10px 0;
      line-height: 1.4;
      color: #333;
    }

    #togglePlot {
      display: inline-block;
      margin-top: 5px;
      color: #0072ff;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    .extra-info {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #333;
    }

    #telegramBtn {
      margin: 0 14px 20px 14px;
      width: calc(100% - 28px);
      padding: 14px;
      border-radius: 40px;
      background: linear-gradient(135deg, #0088cc, #0055a4);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .close-modal {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, .6);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff !important;
      font-size: 20px;
      font-weight: bold;
    }

    .language-container {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-left: 15px;
      padding-right: 15px;
      padding-top: 10px;
      padding-bottom: 10px;
      scrollbar-width: thin;
    }

    .lang-btn {
      padding: 8px 18px;
      border-radius: 40px;
      border: none;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .toast-message {
      position: fixed;
      top: 80px;
      right: 20px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      padding: 12px 20px;
      border-radius: 16px;
      font-weight: bold;
      font-size: 14px;
      z-index: 10000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, .2);
      animation: slideInRight .3s ease, fadeOut .3s ease 1.5s forwards;
      pointer-events: none;
      max-width: 250px;
      text-align: center;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    body.dark-mode {
      background: #1a1a2e;
      color: #fff;
    }

    body.dark-mode .modal-card {
      background: #0f172a;
      color: #fff;
    }

    body.dark-mode .modal-info h2,
    body.dark-mode .year-text,
    body.dark-mode .meta span,
    body.dark-mode .extra-info p,
    body.dark-mode .plot-text {
      color: #fff !important;
    }

    body.dark-mode .genres span {
      background: #1e2a3a;
      color: #e2e8f0 !important;
    }

    body.dark-mode #togglePlot {
      color: #00c6ff !important;
    }

    body.dark-mode .lang-btn {
      background: linear-gradient(45deg, #e94560, #ff6b6b);
    }

    #searchResultsContainer {
      display: none;
      padding: 20px 15px;
    }

    #searchResultsContainer h3 {
      margin-bottom: 15px;
      font-size: 18px;
    }

    .search-results-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: flex-start;
    }

    .search-result-card {
      flex-shrink: 0;
      text-align: center;
      cursor: pointer;
      width: 120px;
    }

    .search-result-card img {
      width: 120px;
      height: 180px;
      border-radius: 8px;
      object-fit: cover;
    }

    .no-results {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #666;
    }

    @media screen and (max-width:480px) {
      .banner-container {
        border-radius: 15px;
      }
      .banner-item {
        border-radius: 15px;
        height: 180px;
      }
      .card img, .upcoming-card img {
        width: 100px;
        height: 150px;
      }
      #searchInput {
        width: 130px;
      }
      .search-result-card {
        width: 100px;
      }
      .search-result-card img {
        width: 100px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-circle"></div>
      <div class="logo-text">Cinemaniacs Hub</div>
    </div>
    <div class="header-right">
      <input type="text" id="searchInput" placeholder="Search movies, series...">
      <button id="themeToggle" style="background:#f0f0f0;border:none;font-size:20px;cursor:pointer;padding:8px;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;">🌙</button>
    </div>
  </div>

  <div id="homepageContent">
    <div class="banner-container">
      <div class="banner-slide" id="bannerSlide"></div>
      <div class="banner-dots" id="bannerDots"></div>
      <div class="arrow arrow-left" id="arrowLeft">&#10094;</div>
      <div class="arrow arrow-right" id="arrowRight">&#10095;</div>
    </div>
    <div class="section-header"><h2>| Watch Popular Movies</h2><span class="more-btn" data-target="popularMovies">+ More</span></div>
    <div class="movies" id="popularMovies"></div>
    <div class="section-header"><h2>| Select Language</h2></div>
    <div class="language-container">
      <button class="lang-btn" data-lang="hindi">Hindi</button>
      <button class="lang-btn" data-lang="english">English</button>
      <button class="lang-btn" data-lang="tamil">Tamil</button>
      <button class="lang-btn" data-lang="telugu">Telugu</button>
      <button class="lang-btn" data-lang="malayalam">Malayalam</button>
      <button class="lang-btn" data-lang="kannada">Kannada</button>
    </div>
    <div id="languageModal" class="movie-modal">
      <div class="modal-card"><div class="close-modal" id="closeLangModal">✕</div><h2 id="langModalTitle" style="text-align:center;padding:25px 20px 10px;">Movies</h2><div id="languageMoviesList" style="display:flex;flex-wrap:wrap;gap:15px;padding:20px;justify-content:center;max-height:60vh;overflow-y:auto;"></div></div>
    </div>
    <div class="section-header"><h2>| Upcoming Movies</h2><span class="more-btn" data-target="upcomingMovies">+ More</span></div>
    <div class="movies" id="upcomingMovies"></div>
    <div class="section-header"><h2>| Popular WebSeries</h2><span class="more-btn" data-target="webSeries">+ More</span></div>
    <div class="movies" id="webSeries"></div>
  </div>

  <div id="searchResultsContainer"><h3>Search Results</h3><div id="searchResultsGrid" class="search-results-grid"></div></div>

  <div class="bottomnav">
    <div class="menu" data-nav="home"><img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="home"></div>
    <div class="menu" data-nav="tv"><img src="https://cdn-icons-png.flaticon.com/512/1527/1527064.png" alt="tv"></div>
    <div class="menu" data-nav="games"><img src="https://cdn-icons-png.flaticon.com/512/10855/10855296.png" alt="games"></div>
  </div>

  <div id="movieModal" class="movie-modal">
    <div class="modal-card"><img id="modalPoster" class="modal-poster"><div class="close-modal" id="closeModalBtn">✕</div><div class="modal-info"><h2 id="modalTitle"></h2><div id="modalYearText" class="year-text"></div><div class="meta"><span class="imdb">IMDB <b id="modalRating"></b></span><span id="modalAge"></span></div><div class="genres" id="modalGenres"></div><p id="modalPlot" class="plot-text"></p><span id="togglePlot" class="plot-toggle">Show More ▼</span><div class="extra-info"><p><b>Duration:</b> <span id="modalDuration"></span></p><p><b>Type:</b> <span id="modalType"></span></p><p><b>Director:</b> <span id="modalDirector"></span></p><p><b>Released:</b> <span id="modalRelease"></span></p><p><b>Language:</b> <span id="modalLanguage"></span></p><p><b>Quality:</b> <span id="modalQuality"></span></p></div></div><button id="streamBtn" style="margin:0 14px 12px 14px;width:calc(100% - 28px);padding:14px;border-radius:40px;background:linear-gradient(135deg,#ff416c,#ff4b2b);color:white;border:none;font-weight:bold;cursor:pointer;">🎬 Watch Now (Stream)</button><button id="telegramBtn">📱 Get Telegram Files</button></div>
  </div>

  <script>
    let movieData = {
      popular: [],
      upcoming: [],
      webSeries: [],
      bannerSlides: []
    };

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function showLoadingAndRedirect(link, buttonType) {
      if (!link || link === '#') {
        showToast(`${buttonType} link not available`);
        return;
      }
      
      const loadingDiv = document.createElement('div');
      loadingDiv.id = 'loadingOverlay';
      loadingDiv.innerHTML = `
        <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10001; display:flex; align-items:center; justify-content:center; flex-direction:column;">
          <div style="background:linear-gradient(45deg, #00c6ff, #0072ff); width:70px; height:70px; border-radius:50%; animation:pulse 1s ease-in-out infinite;"></div>
          <p style="color:white; margin-top:25px; font-size:18px; font-weight:600;">Loading ${buttonType}...</p>
          <p style="color:#aaa; margin-top:10px; font-size:14px;">Redirecting in <span id="countdown" style="color:#00c6ff; font-weight:bold; font-size:18px;">5</span> seconds</p>
          <button id="cancelLoading" style="margin-top:30px; padding:8px 25px; border-radius:30px; border:none; background:#ff4757; color:white; cursor:pointer; font-weight:bold;">Cancel</button>
        </div>
        <style>
          @keyframes pulse {
            0% { transform:scale(0.8); opacity:0.5; box-shadow:0 0 0 0 rgba(0,114,255,0.7); }
            70% { transform:scale(1.1); opacity:1; box-shadow:0 0 0 15px rgba(0,114,255,0); }
            100% { transform:scale(0.8); opacity:0.5; box-shadow:0 0 0 0 rgba(0,114,255,0); }
          }
        </style>
      `;
      document.body.appendChild(loadingDiv);
      
      let seconds = 5;
      let cancelled = false;
      const countdownEl = document.getElementById('countdown');
      
      const timer = setInterval(() => {
        if (cancelled) return;
        seconds--;
        if (countdownEl) countdownEl.innerText = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          loadingDiv.remove();
          window.open(link, '_blank');
        }
      }, 1000);
      
      const cancelBtn = document.getElementById('cancelLoading');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
          cancelled = true;
          clearInterval(timer);
          loadingDiv.remove();
          showToast('Redirect cancelled');
        });
      }
    }

    async function loadMovies() {
      try {
        const response = await fetch('movies.json');
        if (!response.ok) throw new Error('Failed to load movies.json');
        const data = await response.json();
        movieData = data;
        renderAll();
        initBanner();
        
        // FIX: Banner Watch Now button listeners - added after data loads
        setTimeout(() => {
          document.querySelectorAll('.banner-watch-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const title = btn.getAttribute('data-title');
              const allMovies = [...movieData.popular, ...movieData.upcoming, ...movieData.webSeries];
              const found = allMovies.find(m => m.title === title);
              if (found) {
                openModal(found);
              } else {
                showToast('Movie details not found');
              }
            });
          });
        }, 200);
        
        initTelegramButton();
        initStreamButton();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('popularMovies').innerHTML = '<div style="padding:20px;text-align:center">⚠️ Failed to load movies.json</div>';
        document.getElementById('upcomingMovies').innerHTML = '<div style="padding:20px;text-align:center">⚠️ Failed to load movies.json</div>';
        document.getElementById('webSeries').innerHTML = '<div style="padding:20px;text-align:center">⚠️ Failed to load movies.json</div>';
      }
    }

    function renderSection(containerId, items, isUpcoming) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';
      if (!items || items.length === 0) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">No items available</div>';
        return;
      }
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = isUpcoming ? 'upcoming-card' : 'card';
        card.innerHTML = `<img src="${item.poster}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/120x180?text=No+Image'"><div class="title">${item.title}<br><span class="year">(${item.year})</span></div>`;
        card.addEventListener('click', () => openModal(item));
        container.appendChild(card);
      });
    }

    function openModal(movie) {
      const fullPlot = movie.plot || "No description available";
      const plotEl = document.getElementById('modalPlot');
      const toggleBtn = document.getElementById('togglePlot');
      let expanded = false;
      const shortPlot = fullPlot.length > 100 ? fullPlot.substring(0, 100) + "..." : fullPlot;
      plotEl.innerText = shortPlot;
      toggleBtn.style.display = fullPlot.length > 100 ? "inline-block" : "none";
      toggleBtn.innerText = "Show More ▼";
      toggleBtn.onclick = () => {
        expanded = !expanded;
        if (expanded) { plotEl.innerText = fullPlot; toggleBtn.innerText = "Show Less ▲"; }
        else { plotEl.innerText = shortPlot; toggleBtn.innerText = "Show More ▼"; }
      };
      document.getElementById('modalTitle').innerText = movie.title;
      document.getElementById('modalPoster').src = movie.poster;
      document.getElementById('modalRating').innerText = movie.rating || "N/A";
      document.getElementById('modalYearText').innerText = "(" + movie.year + ")";
      document.getElementById('modalAge').innerText = movie.age || "U/A";
      document.getElementById('modalDuration').innerText = movie.duration || "-";
      document.getElementById('modalType').innerText = movie.type || "-";
      document.getElementById('modalDirector').innerText = movie.director || "-";
      document.getElementById('modalRelease').innerText = movie.released || "-";
      let langVal = movie.language ? (Array.isArray(movie.language) ? movie.language.join(", ") : movie.language) : "-";
      document.getElementById('modalLanguage').innerText = langVal;
      document.getElementById('modalQuality').innerText = movie.quality || "-";
      const genresContainer = document.getElementById('modalGenres');
      genresContainer.innerHTML = movie.genres ? movie.genres.map(g => `<span>${g}</span>`).join('') : '';
      document.getElementById('streamBtn').setAttribute('data-stream-link', movie.streamLink || '#');
      document.getElementById('telegramBtn').setAttribute('data-telegram-link', movie.telegramLink || "#");
      document.getElementById('movieModal').classList.add('show');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      document.getElementById('movieModal').classList.remove('show');
      document.body.classList.remove('modal-open');
    }

    function renderAll() {
      renderSection('popularMovies', movieData.popular, false);
      renderSection('upcomingMovies', movieData.upcoming, true);
      renderSection('webSeries', movieData.webSeries, false);
    }

    function initBanner() {
      const container = document.getElementById('bannerSlide');
      const dotsContainer = document.getElementById('bannerDots');
      if (!container) return;
      const slides = movieData.bannerSlides;
      if (!slides || slides.length === 0) return;
      container.innerHTML = '';
      slides.forEach(slide => {
        const div = document.createElement('div');
        div.className = 'banner-item';
        div.style.backgroundImage = `url('${slide.poster}')`;
        div.innerHTML = `<div class="banner-content"><h1>${slide.title}</h1><p>${slide.year} • ${slide.type}</p><button class="banner-watch-btn" data-title="${slide.title}">Watch Now</button></div>`;
        container.appendChild(div);
      });
      
      const total = slides.length;
      container.appendChild(container.children[0].cloneNode(true));
      container.insertBefore(container.children[total-1].cloneNode(true), container.children[0]);
      container.style.transform = 'translateX(-100%)';
      
      dotsContainer.innerHTML = '';
      slides.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.classList.add('banner-dot');
        if(i === 0) dot.classList.add('active');
        dot.addEventListener('click', () => goToSlide(i));
        dotsContainer.appendChild(dot);
      });
      
      let currentIndex = 0;
      let autoInterval;
      
      function updateDots() {
        const dots = document.querySelectorAll('.banner-dot');
        let realIdx = ((currentIndex % total) + total) % total;
        dots.forEach((dot, i) => { if(i === realIdx) dot.classList.add('active'); else dot.classList.remove('active'); });
      }
      
      function goToSlide(idx) { currentIndex = idx; container.style.transition = 'transform 0.6s ease'; container.style.transform = `translateX(-${(currentIndex+1)*100}%)`; updateDots(); }
      function next() { currentIndex++; container.style.transition = 'transform 0.6s ease'; container.style.transform = `translateX(-${(currentIndex+1)*100}%)`; }
      function prev() { currentIndex--; container.style.transition = 'transform 0.6s ease'; container.style.transform = `translateX(-${(currentIndex+1)*100}%)`; }
      function resetTimer() { if(autoInterval) clearInterval(autoInterval); autoInterval = setInterval(() => next(), 4000); }
      
      container.addEventListener('transitionend', () => {
        if(currentIndex >= total) { container.style.transition = 'none'; currentIndex = 0; container.style.transform = 'translateX(-100%)'; updateDots(); }
        else if(currentIndex < 0) { container.style.transition = 'none'; currentIndex = total-1; container.style.transform = `translateX(-${(currentIndex+1)*100}%)`; updateDots(); }
        updateDots();
      });
      
      document.getElementById('arrowLeft')?.addEventListener('click', () => { prev(); resetTimer(); });
      document.getElementById('arrowRight')?.addEventListener('click', () => { next(); resetTimer(); });
      resetTimer();
    }

    function initSearch() {
      const input = document.getElementById('searchInput');
      const homepage = document.getElementById('homepageContent');
      const searchContainer = document.getElementById('searchResultsContainer');
      const searchGrid = document.getElementById('searchResultsGrid');
      input.addEventListener('input', function() {
        const filter = this.value.toLowerCase().trim();
        if(filter === '') { homepage.style.display = 'block'; searchContainer.style.display = 'none'; return; }
        homepage.style.display = 'none'; searchContainer.style.display = 'block';
        const all = [...movieData.popular, ...movieData.upcoming, ...movieData.webSeries];
        const matches = all.filter(m => m.title.toLowerCase().includes(filter));
        searchGrid.innerHTML = '';
        if(matches.length === 0) { searchGrid.innerHTML = '<div class="no-results">No matching movies or series found</div>'; return; }
        matches.forEach(m => {
          const card = document.createElement('div'); card.className = 'search-result-card';
          card.innerHTML = `<img src="${m.poster}" onerror="this.src='https://via.placeholder.com/120x180?text=No+Image'"><div class="title">${m.title}<br><span class="year">(${m.year})</span></div>`;
          card.addEventListener('click', () => openModal(m));
          searchGrid.appendChild(card);
        });
      });
    }

    function initLanguageFilter() {
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const lang = btn.getAttribute('data-lang');
          const titles = { hindi:'Hindi Movies', english:'English Movies', tamil:'Tamil Movies', telugu:'Telugu Movies', malayalam:'Malayalam Movies', kannada:'Kannada Movies' };
          document.getElementById('langModalTitle').innerText = titles[lang] || 'Movies';
          const all = [...movieData.popular, ...movieData.upcoming, ...movieData.webSeries];
          const filtered = all.filter(m => {
            if(!m.language) return false;
            const langs = Array.isArray(m.language) ? m.language : [m.language];
            return langs.some(l => l.trim().toLowerCase() === lang.toLowerCase());
          });
          const container = document.getElementById('languageMoviesList');
          container.innerHTML = '';
          if(filtered.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center">No movies available</div>'; return; }
          filtered.forEach(m => {
            const card = document.createElement('div'); card.className = 'lang-movie-card';
            card.innerHTML = `<img src="${m.poster}" onerror="this.src='https://via.placeholder.com/100x150?text=No+Image'"><div class="title">${m.title}<br><span class="year">(${m.year})</span></div>`;
            card.addEventListener('click', () => openModal(m));
            container.appendChild(card);
          });
          document.getElementById('languageModal').classList.add('show');
          document.body.classList.add('modal-open');
        });
      });
      document.getElementById('closeLangModal')?.addEventListener('click', () => {
        document.getElementById('languageModal').classList.remove('show');
        document.body.classList.remove('modal-open');
      });
      document.getElementById('languageModal')?.addEventListener('click', (e) => {
        if(e.target === document.getElementById('languageModal')) {
          document.getElementById('languageModal').classList.remove('show');
          document.body.classList.remove('modal-open');
        }
      });
    }

    function initMoreButtons() {
      document.querySelectorAll('.more-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.getAttribute('data-target'));
          if(target) target.scrollLeft += 260;
        });
      });
    }

    function initBottomNav() {
      document.querySelectorAll('.bottomnav .menu').forEach(menu => {
        menu.addEventListener('click', () => {
          if(menu.getAttribute('data-nav') !== 'home') {
            showToast('Coming Soon..!');
            return;
          }
          document.querySelectorAll('.bottomnav .menu').forEach(m => m.classList.remove('active-bar'));
          menu.classList.add('active-bar');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
      setTimeout(() => {
        document.querySelector('.bottomnav .menu[data-nav="home"]')?.classList.add('active-bar');
      }, 100);
    }

    function initTelegramButton() {
      const telegramBtn = document.getElementById('telegramBtn');
      if (telegramBtn) {
        const newBtn = telegramBtn.cloneNode(true);
        telegramBtn.parentNode.replaceChild(newBtn, telegramBtn);
        newBtn.addEventListener('click', () => {
          const link = newBtn.getAttribute('data-telegram-link') || '#';
          showLoadingAndRedirect(link, 'Telegram Files');
        });
      }
    }

    function initStreamButton() {
      const streamBtn = document.getElementById('streamBtn');
      if (streamBtn) {
        const newBtn = streamBtn.cloneNode(true);
        streamBtn.parentNode.replaceChild(newBtn, streamBtn);
        newBtn.addEventListener('click', () => {
          const link = newBtn.getAttribute('data-stream-link') || '#';
          showLoadingAndRedirect(link, 'Stream');
        });
      }
    }

    function initTheme() {
      const btn = document.getElementById('themeToggle');
      const body = document.body;
      if(localStorage.getItem('theme') === 'dark') { body.classList.add('dark-mode'); btn.innerHTML = '☀️'; }
      btn.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        if(body.classList.contains('dark-mode')) { btn.innerHTML = '☀️'; localStorage.setItem('theme', 'dark'); }
        else { btn.innerHTML = '🌙'; localStorage.setItem('theme', 'light'); }
      });
    }

    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('movieModal').addEventListener('click', (e) => { if(e.target === document.getElementById('movieModal')) closeModal(); });

    loadMovies();
    initSearch();
    initLanguageFilter();
    initMoreButtons();
    initBottomNav();
    initTheme();
  </script>
</body>
</html>
